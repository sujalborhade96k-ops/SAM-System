<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visitor - Students List • SAM SYSTEM</title>

  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black min-h-screen font-sans">

  <!-- HEADER -->
  <header class="bg-gradient-to-r from-gray-900 to-black border-b-2 border-green-600 p-6 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <button onclick="goBack()" class="p-2 hover:bg-white/10 rounded-xl transition-all">
          <span class="text-xl">←</span>
        </button>
        <div class="w-12 h-12 bg-green-600 rounded-xl flex items-center justify-center">
          <span class="text-2xl">👀</span>
        </div>
        <div id="academyTitle" class="min-w-0">
          <h1 class="text-2xl font-black text-white tracking-tight truncate">Loading...</h1>
          <p class="text-green-400 text-sm font-semibold">VISITOR MODE</p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <button onclick="toggleSearch()" class="p-3 bg-white/10 hover:bg-white/20 border border-white/30 rounded-xl text-white transition-all duration-200">
          <span class="text-xl">🔍</span>
        </button>
        <button onclick="logout()" class="px-6 py-2 bg-white/10 hover:bg-white/20 border border-white/30 rounded-xl text-white font-semibold transition-all duration-200">
          Logout
        </button>
      </div>
    </div>

    <!-- SEARCH BAR -->
    <div id="searchContainer" class="max-w-6xl mx-auto px-6 pb-6 hidden">
      <div class="relative">
        <input type="text" id="studentSearch" placeholder="Search students by name or sport..." class="w-full input-field pl-14 pr-6 py-4 text-lg" maxlength="50">
        <span class="absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl">🔍</span>
        <div id="clearSearch" class="absolute right-5 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white cursor-pointer hidden">
          <span class="text-xl">✕</span>
        </div>
      </div>
      <div id="searchCount" class="text-sm text-gray-400 mt-2 hidden"></div>
    </div>
  </header>

  <!-- STUDENTS LIST -->
  <div class="max-w-6xl mx-auto p-6 pb-12">
    <div class="mb-12">
      <h2 class="text-3xl font-black text-white mb-8 flex items-center">
        <span class="w-12 h-12 bg-gradient-to-r from-green-500 to-green-600 rounded-xl flex items-center justify-center mr-4 text-2xl">👥</span>
        Student Directory
      </h2>

      <!-- SUMMARY STATS -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="login-card bg-gradient-to-b from-green-600 to-green-700 text-white p-6 text-center rounded-2xl">
          <div class="text-3xl font-black mb-1" id="totalStudents">0</div>
          <p class="text-green-100 text-sm uppercase tracking-wider">Total Students</p>
        </div>
      </div>

      <!-- STUDENTS GRID -->
      <div id="studentsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
  <div class="text-center py-12 col-span-full">
    <div class="w-20 h-20 bg-green-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <i class="fas fa-spinner fa-spin text-2xl text-white"></i>
    </div>
    <p class="text-xl text-gray-400">Loading students...</p>
  </div>
</div>

<div id="noStudents" class="text-center py-20 hidden">
  <div class="w-24 h-24 bg-white/10 rounded-3xl flex items-center justify-center mx-auto mb-6">
    <i class="fas fa-users-slash text-4xl text-gray-400"></i>
  </div>
  <h3 class="text-2xl font-black text-white mb-4">No Students Found</h3>
  <p class="text-gray-400 mb-8">This academy has no public student profiles</p>
  <button onclick="goBack()" class="px-8 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white font-bold rounded-xl shadow-lg hover:from-green-600 hover:to-green-700">← Back to Academies</button>
</div>

      
    </div>
  </div>

  <script>
  

    // Initialize page
   window.addEventListener('DOMContentLoaded', async () => {
  const visitorSession = localStorage.getItem('visitorSession');
  if (!visitorSession) {
    alert('👋 Please login as Visitor');
    window.location.href = 'index.html';
    return;
  }
  await loadAcademyStudents();
});


    async function loadAcademyStudents() {
  const urlParams = new URLSearchParams(window.location.search);
  const academyId = urlParams.get('academyId');
  
  if (!academyId) {
    document.getElementById('noStudents').classList.remove('hidden');
    return;
  }

  try {
    // Get academy name
    const academyRes = await fetch(`http://localhost:5000/api/academy/${academyId}`);
    const academyData = await academyRes.json();
    const academyName = academyData.academy?.name || 'Academy';
    
    document.getElementById('academyTitle').innerHTML = `
      <h1 class="text-2xl font-black text-white tracking-tight truncate">${academyName}</h1>
      <p class="text-green-400 text-sm font-semibold">${academyId}</p>
    `;

    // Get students
    const studentsRes = await fetch(`http://localhost:5000/api/students/${academyId}`);
    const studentsData = await studentsRes.json();
    const students = studentsData.students || [];

    document.getElementById('totalStudents').textContent = students.length;
    document.getElementById('studentsList').innerHTML = '';

    if (students.length === 0) {
      document.getElementById('noStudents').classList.remove('hidden');
      return;
    }

    students.forEach(student => {
      const card = createStudentCard(student);
      document.getElementById('studentsList').appendChild(card);
    });

  } catch (err) {
    document.getElementById('studentsList').innerHTML = '<p class="text-center text-red-400 py-12 col-span-full">Failed to load students</p>';
  }
}


    // Create student card
    function createStudentCard(student) {
      const div = document.createElement('div');
      div.className = 'group login-card bg-gradient-to-b from-gray-900/80 to-black/50 border-2 border-green-500 hover:border-green-400 p-6 rounded-3xl cursor-pointer transition-all duration-300 hover:-translate-y-2';
      div.onclick = () => goToProfile(student);
      
      div.innerHTML = `
        <div class="flex items-start space-x-4 mb-4">
         
          <div class="flex-1 min-w-0">
            <h3 class="text-xl font-black text-white mb-1 truncate">${student.name}</h3>
            <p class="text-green-400 font-semibold text-sm mb-2">${student.sport}</p>
            <div class="flex items-center text-xs text-gray-400 space-x-4 mb-2">
              <span>👦 ${student.age} yrs</span>
              <span>📚 ${student.batch}</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-2">
              <div class="bg-gradient-to-r from-green-400 to-emerald-400 h-2 rounded-full transition-all duration-300" style="width: ${student.stats}"></div>
            </div>
            
          </div>
        </div>
        <div class="flex items-center justify-between pt-4 border-t border-white/10">
          <span class="text-xs text-gray-400">Tap for full profile</span>
          <button class="px-6 py-2 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold rounded-xl text-sm shadow-lg transition-all flex items-center space-x-1">
            <span>View Profile</span>
            <span>→</span>
          </button>
        </div>
      `;
      
      return div;
    }

    // Go to player profile
    function goToProfile(student) {
  const urlParams = new URLSearchParams(window.location.search);
  const academyId = urlParams.get('academyId');
  window.location.href = `player_profile.html?studentId=${student._id}&academyId=${academyId}`;
}


    // Navigation
    function goBack() {
      window.location.href = 'visitor_academy.html';
    }

    // Toggle search
    function toggleSearch() {
      const container = document.getElementById('searchContainer');
      container.classList.toggle('hidden');
      if (!container.classList.contains('hidden')) {
        document.getElementById('studentSearch').focus();
      }
    }

    // Search students
    document.getElementById('studentSearch').addEventListener('input', function(e) {
      const query = e.target.value.toLowerCase().trim();
      const students = document.querySelectorAll('#studentsList > div');
      const clearBtn = document.getElementById('clearSearch');
      
      let visibleCount = 0;
      
      students.forEach(student => {
        const text = student.textContent.toLowerCase();
        const isVisible = text.includes(query);
        student.style.display = isVisible ? 'block' : 'none';
        if (isVisible) visibleCount++;
      });
      
      clearBtn.classList.toggle('hidden', query.length === 0);
      document.getElementById('searchCount').classList.toggle('hidden', query.length === 0);
      if (query.length > 0) {
        document.getElementById('searchCount').textContent = `Showing ${visibleCount} students`;
      }
    });

    // Clear search
    document.getElementById('clearSearch').addEventListener('click', function() {
      document.getElementById('studentSearch').value = '';
      document.querySelectorAll('#studentsList > div').forEach(s => s.style.display = 'block');
      this.classList.add('hidden');
      document.getElementById('searchCount').classList.add('hidden');
    });

    // Logout
    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
