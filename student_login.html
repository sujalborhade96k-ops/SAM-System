<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login - SAM SYSTEM</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-black min-h-screen">
  
  <!-- BACKGROUND ELEMENTS -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-blue-500/10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-500/10 rounded-full blur-3xl animate-pulse delay-1000"></div>
  </div>

  <div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 py-12">
    
    <!-- STUDENT LOGO -->
    <div class="w-24 h-24 bg-gradient-to-r from-blue-400 to-purple-500 rounded-2xl flex items-center justify-center mb-8 shadow-2xl border-4 border-white/20">
      <span class="text-3xl">🎓</span>
    </div>
    
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-12 max-w-md w-full shadow-2xl text-center">
      
      <!-- STUDENT TITLE -->
      <h1 class="text-4xl md:text-5xl font-black bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-6">
        STUDENT PORTAL
      </h1>
      <p class="text-blue-100/80 text-xl mb-12 font-semibold">Access your academies & track progress</p>
      
      <!-- LOGIN FORM -->
      <form id="student-login" class="space-y-6">
        <div>
          <input type="text" id="student-username" placeholder="Student ID / Email" class="w-full input-field-student h-16 text-xl text-white placeholder-blue-200/70 focus:ring-4 focus:ring-blue-500/50" required>
        </div>
        <div>
          <input type="password" id="student-password" placeholder="Password" class="w-full input-field-student h-16 text-xl text-white placeholder-blue-200/70 focus:ring-4 focus:ring-blue-500/50" required>
        </div>
        <button type="submit" class="w-full btn-student-login bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-black text-xl py-6 px-8 rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300">
          🚀 ENTER STUDENT PORTAL
        </button>
      </form>

      <!-- DEMO CREDENTIALS -->
      <div class="mt-10 pt-8 border-t border-white/20">
        <p class="text-blue-200/70 text-sm mb-4 font-semibold">📋 Demo Login:</p>
        <div class="text-left space-y-2 text-sm">
          <div class="flex items-center text-blue-300">
            <span class="w-2 h-2 bg-blue-400 rounded-full mr-3"></span>
            <strong>Username:</strong> stduser
          </div>
          <div class="flex items-center text-blue-300">
            <span class="w-2 h-2 bg-blue-400 rounded-full mr-3"></span>
            <strong>Password:</strong> pass
          </div>
        </div>
      </div>

      <!-- BACK TO HOME -->
      <div class="mt-10">
        <a href="index.html" class="inline-flex items-center text-blue-300 hover:text-white font-semibold text-lg transition-all">
          ← Back to Home
        </a>
      </div>

    </div>

    <!-- FOOTER INFO -->
    <div class="mt-16 text-center">
      <p class="text-blue-200/50 text-sm">Track attendance • View schedules • Check fees</p>
    </div>

  </div>

  <script>
    // STUDENT LOGIN HANDLER
    document.getElementById('student-login').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('student-username').value;
      const password = document.getElementById('student-password').value;
      
      // STUDENT AUTHENTICATION
      if (username === 'stduser' && password === 'pass') {
        localStorage.setItem('role', 'student');
        localStorage.setItem('user', 'stduser');
        window.location.href = 'academies.html';
      } else {
        alert('❌ Invalid student credentials!\n\nUse: stduser / pass');
      }
    });

    // PREVENT DIRECT ACCESS
    if (window.location.pathname.includes('student_login.html') && !localStorage.getItem('role')) {
      // Allow direct access for login
    }
  </script>

  <style>
    .input-field-student {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      padding: 0 1.5rem;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    
    .input-field-student:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      transform: translateY(-2px);
    }
  </style>

</body>
</html>
