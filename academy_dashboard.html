<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-indigo-900 min-h-screen text-white">

<!-- NAVBAR -->
<nav class="bg-white/10 backdrop-blur-xl border-b border-blue-500/30 sticky top-0 z-50">
  <div class="flex flex-wrap items-center justify-between px-4 sm:px-6 py-4 gap-3">

    <div class="flex items-center flex-wrap gap-3">
      <a href="academies.html" class="text-lg sm:text-2xl font-bold hover:text-blue-300">← Academies</a>

      <div class="w-12 h-12 sm:w-14 sm:h-14 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-2xl border-2 border-white/30">
        <span class="text-2xl">🎓</span>
      </div>

      <div>
        <h2 class="text-lg sm:text-2xl font-black bg-gradient-to-r from-white to-blue-200 bg-clip-text text-transparent">
          STUDENT DASHBOARD
        </h2>
        <p class="text-blue-200 text-xs sm:text-sm uppercase tracking-wide">Academy Portal</p>
      </div>
    </div>

    <button onclick="logout()" class="bg-red-500/20 hover:bg-red-500/30 text-red-200 font-bold px-4 sm:px-6 py-2 sm:py-3 rounded-xl border border-red-500/40 text-sm sm:text-base">
      Logout
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="max-w-7xl mx-auto px-4 sm:px-8 py-6 sm:py-10 space-y-8 sm:space-y-10">

  <!-- STUDENT DETAILS -->
  <div class="bg-white/10 backdrop-blur-xl border border-blue-500/30 rounded-3xl p-6 sm:p-8 shadow-2xl">
    <h3 class="text-2xl font-bold mb-6 text-blue-200">My Details</h3>
    <div id="studentDetails" class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-blue-100"></div>
  </div>

  <!-- ATTENDANCE -->
  <div class="bg-white/10 backdrop-blur-xl border border-blue-500/30 rounded-3xl p-6 sm:p-8 shadow-2xl">
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 sm:mb-8 gap-4 sm:gap-0">

      <h3 class="text-2xl font-bold text-blue-200 tracking-wide">📅 Attendance</h3>

      <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 w-full sm:w-auto">
        <select id="month" class="bg-white text-black font-semibold px-3 py-2 sm:px-4 sm:py-2 rounded-xl border border-blue-400 shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 hover:border-blue-300 text-sm sm:text-base">
        </select>

        <select id="year" class="bg-white text-black font-semibold px-3 py-2 sm:px-4 sm:py-2 rounded-xl border border-blue-400 shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-500 hover:border-blue-300 text-sm sm:text-base">
        </select>

        <button onclick="loadAttendance()" class="bg-gradient-to-r from-blue-500 to-purple-600 px-4 sm:px-6 py-2 rounded-xl font-bold shadow-lg hover:scale-105 hover:shadow-2xl transition-all text-sm sm:text-base">
          Update
        </button>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table class="min-w-full text-center text-blue-100 rounded-xl">
        <thead class="bg-blue-700/80 text-white text-lg">
          <tr>
            <th class="py-3">Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="attendanceTable" class="divide-y divide-blue-500/20"></tbody>
      </table>
    </div>
  </div>

  <!-- FEES -->
  <div class="bg-white/10 backdrop-blur-xl border border-blue-500/30 rounded-3xl p-6 sm:p-8 shadow-2xl">
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 sm:mb-6 gap-3 sm:gap-4">

      <h3 class="text-2xl font-bold text-blue-200">Fees</h3>

      <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 w-full sm:w-auto">
        <select id="feesYear" class="bg-white text-black px-3 py-2 sm:px-4 sm:py-2 rounded-xl border border-blue-400 text-sm sm:text-base"></select>
        <button onclick="loadFees()" class="bg-gradient-to-r from-blue-500 to-purple-600 px-4 sm:px-6 py-2 rounded-xl font-bold text-sm sm:text-base">
          Update
        </button>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table class="min-w-full text-center text-blue-100">
        <thead class="bg-purple-700/60 text-white">
          <tr>
            <th>Month</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Paid Date</th>
          </tr>
        </thead>
        <tbody id="feesTable" class="divide-y divide-purple-500/20"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
const API = "http://localhost:5000";

let academyId, studentId; // Global variables

/* ==============================
   AUTH CHECK (100% Fixed)
============================== */
function checkAuth() {
  academyId = localStorage.getItem("selectedAcademy") || localStorage.getItem("academyId");
  studentId = localStorage.getItem("studentId");
  const storedUser = localStorage.getItem("samsUser");

  console.log("Session Debug:", { academyId, studentId, hasUser: !!storedUser });

  if (!storedUser || !academyId || !studentId) {
    console.log("Missing session data, redirecting...");
    localStorage.clear();
    window.location.href = "index.html";
    return true;
  }

  try {
    const user = JSON.parse(storedUser);
    if (user.role !== "student") {
      console.log("Unauthorized role:", user.role);
      window.location.href = "index.html";
      return true;
    }
    return false;
  } catch (e) {
    console.log("Invalid user data");
    localStorage.clear();
    window.location.href = "index.html";
    return true;
  }
}

/* ==============================
   INIT EVERYTHING
============================== */
function initApp() {
  // Check auth first
  if (checkAuth()) {
    return; // ✅ SAFE inside function
  }

  // Auth passed, init UI
  initDropdowns();
  initEventListeners();
  loadDashboard();
}

/* ==============================
   INIT DROPDOWNS
============================== */
function initDropdowns() {
  const monthSelect = document.getElementById("month");
  const yearSelect = document.getElementById("year");
  const feesYear = document.getElementById("feesYear");

  const months = [
    'January','February','March','April','May','June',
    'July','August','September','October','November','December'
  ];

  monthSelect.innerHTML = months.map((m,i)=>
    `<option value="${i+1}">${m}</option>`
  ).join("");

  const now = new Date();
  const currentYear = now.getFullYear();

  // generate 5 years
  let yearsHTML = "";
  for(let y=currentYear-2; y<=currentYear+2; y++){
    yearsHTML += `<option value="${y}">${y}</option>`;
  }

  yearSelect.innerHTML = yearsHTML;
  feesYear.innerHTML = yearsHTML;

  monthSelect.value = now.getMonth()+1;
  yearSelect.value = currentYear;
  feesYear.value = currentYear;
}

/* ==============================
   LOAD DASHBOARD
============================== */
async function loadDashboard() {
  try {
    const res = await fetch(
      `${API}/api/student/dashboard?academyId=${academyId}&studentId=${studentId}`
    );

    if (!res.ok) {
      alert("Session expired");
      localStorage.clear();
      window.location.href = "index.html";
      return;
    }

    const data = await res.json();
    if (!data.success) {
      alert("Failed to load dashboard");
      return;
    }

    const s = data.student;
    const a = data.academy;

    document.getElementById("studentDetails").innerHTML = `
      <p><b>Name:</b> ${s.name || 'N/A'}</p>
      <p><b>Sport:</b> ${s.sport || 'N/A'}</p>
      <p><b>Batch:</b> ${s.batch || 'N/A'}</p>
      <p><b>Contact:</b> ${s.contact || 'N/A'}</p>
      <p><b>Academy:</b> ${a.name || 'N/A'}</p>
    `;

    loadAttendance();
    loadFees();

  } catch (error) {
    console.error("Dashboard Error:", error);
    alert("Failed to load dashboard");
  }
}

/* ==============================
   LOAD ATTENDANCE
============================== */
async function loadAttendance() {
  const month = document.getElementById("month").value;
  const year = document.getElementById("year").value;

  try {
    const res = await fetch(
      `${API}/api/student/attendance?academyId=${academyId}&studentId=${studentId}&month=${month}&year=${year}`
    );

    if (!res.ok) return;

    const data = await res.json();
    const tbody = document.getElementById("attendanceTable");
    tbody.innerHTML = "";

    if (!data || !data.length) {
      tbody.innerHTML = `<tr><td colspan="2">No attendance records</td></tr>`;
      return;
    }

    data.forEach(r => {
      tbody.innerHTML += `
        <tr>
          <td>${r.date || 'N/A'}</td>
          <td>
<span class="${
  r.status === "PRESENT"
    ? "bg-green-500 text-white"
    : "bg-red-500 text-white"
} px-4 py-1 rounded-full font-extrabold tracking-wide shadow-md">
${r.status}
</span>
</td>
        </tr>
      `;
    });

  } catch (error) {
    console.error("Attendance Error:", error);
  }
}

/* ==============================
   LOAD FEES
============================== */
async function loadFees() {
  const year = document.getElementById("feesYear").value;

  try {
    const res = await fetch(
      `${API}/api/student/fees?academyId=${academyId}&studentId=${studentId}&year=${year}`
    );

    if (!res.ok) return;

    const data = await res.json();
    const tbody = document.getElementById("feesTable");
    tbody.innerHTML = "";

    if (!data || !data.length) {
      tbody.innerHTML = `<tr><td colspan="4">No fee records</td></tr>`;
      return;
    }

    data.forEach(f => {
      tbody.innerHTML += `
        <tr>
          <td>${getMonthName(f.month)}</td>
          <td>₹${f.amount || 0}</td>
          <td class="${f.status === 'Paid' ? 'paid' : 'pending'}">
            ${f.status || 'Pending'}
          </td>
          <td>${f.paidDate ? new Date(f.paidDate).toLocaleDateString() : "-"}</td>
        </tr>
      `;
    });

  } catch (error) {
    console.error("Fees Error:", error);
  }
}

function getMonthName(m) {
  const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                  'July', 'August', 'September', 'October', 'November', 'December'];
  return months[m - 1] || 'Unknown';
}

function initEventListeners() {
  document.getElementById("month").addEventListener("change", loadAttendance);
  document.getElementById("year").addEventListener("change", loadAttendance);
  document.getElementById("feesYear").addEventListener("change", loadFees);
}
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

/* ==============================
   START APP
============================== */
window.addEventListener("DOMContentLoaded", initApp);
</script>



</body>
</html>
