<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Academies - SAM SYSTEM</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-indigo-900 min-h-screen font-sans">

  <!-- STUDENT AUTH CHECK -->
  <div id="auth-redirect" class="hidden fixed inset-0 bg-black z-50 flex items-center justify-center">
    <div class="bg-red-500 text-white p-8 rounded-2xl text-center">
      <h2 class="text-2xl font-black mb-4">Access Denied</h2>
      <p>Student login required</p>
      <a href="index.html" class="mt-4 inline-block bg-white text-red-500 px-6 py-3 font-bold rounded-xl">← Back to Login</a>
    </div>
  </div>

  <!-- MAIN CONTENT (Hidden until auth) -->
  <div id="main-content" class="hidden min-h-screen">
    
    <!-- TOP NAV (Student Blue Theme) -->
    <nav class="bg-white/10 backdrop-blur-xl border-b border-blue-500/30 sticky top-0 z-50">
      <div class="flex items-center justify-between px-6 py-5">
        <div class="flex items-center">
          <a href="index.html" onclick="localStorage.clear()" class="flex items-center mr-6 hover:text-blue-300 transition-all text-2xl font-bold">
            ← Home
          </a>
          <div class="w-14 h-14 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mr-5 shadow-2xl border-2 border-white/30">
            <span class="text-2xl">🎓</span>
          </div>
          <div>
            <h2 class="text-2xl font-black bg-gradient-to-r from-white to-blue-100 bg-clip-text text-transparent">MY ACADEMIES</h2>
            <p class="text-blue-200 text-sm font-semibold uppercase tracking-wide">Select academy to continue</p>
          </div>
        </div>
        <div class="flex items-center space-x-4">
          <span class="bg-gradient-to-r from-blue-500/20 to-purple-500/20 backdrop-blur-sm px-5 py-2 rounded-full text-blue-200 font-semibold text-sm border border-blue-500/30">
            Welcome, Student!
          </span>
          <button onclick="logout()" class="bg-red-500/20 hover:bg-red-500/30 text-red-200 font-bold px-8 py-3 rounded-xl border-2 border-red-500/40 transition-all shadow-lg hover:shadow-xl">
            LOGOUT
          </button>
        </div>
      </div>
    </nav>

    <!-- ACADEMIES GRID -->
	  <div class="flex justify-center mt-6">
  <div class="bg-white text-gray-800 px-6 py-3 rounded-xl shadow-lg text-lg font-semibold">
    Academies: <span id="academy-count" class="text-blue-600 font-bold">0</span>
  </div>
</div></br>
    <div class="px-8 pb-24 max-w-7xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="academies-container">
       
            
          

        

    </div>

  </div>
<script>
function getAuthData() {
  const userStr = localStorage.getItem('samsUser');
  if (!userStr) return null;
  
  const user = JSON.parse(userStr);
  const academyId = localStorage.getItem('academyId');
  const studentId = localStorage.getItem('studentId');
  const loginTime = localStorage.getItem('loginTime');
  
  if (loginTime && (Date.now() - parseInt(loginTime) > 24 * 60 * 60 * 1000)) {
    return null;
  }
  
  if (!user.username || (user.role === 'student' && !studentId)) {
  return null;
}
  return { user, academyId, studentId };
}

async function samsFetch(endpoint, options = {}) {
  const isPublic = endpoint.startsWith('/api/auth/') || endpoint.startsWith('/api/public/');
  
  if (!isPublic) {
    const authData = getAuthData();
    if (!authData) {
      alert("Session expired. Please login again.");
      localStorage.clear();
      window.location.href = "index.html";
      return null;
    }
  }

  const academyId = localStorage.getItem('selectedAcademy') || localStorage.getItem('academyId');
  const defaultHeaders = { 
    'Content-Type': 'application/json',
    ...(academyId && { 'academyId': academyId })
  };

  try {
    const response = await fetch(`https://sams-backend-54o0.onrender.com${endpoint}`, {
      ...options,
      headers: { ...defaultHeaders, ...options.headers }
    });

    if (response.status === 401) {
      alert("Session expired. Please login again.");
      localStorage.clear();
      window.location.href = "index.html";
      return null;
    }

    return await response.json();
  } catch (error) {
    console.error("Fetch Error:", error);
    alert("Server connection failed.");
    return null;
  }
}

document.addEventListener("DOMContentLoaded", async function () {
  const authData = getAuthData();
  
  if (!authData || authData.user.role !== "student") {
    document.getElementById("main-content").style.display = "none";
    document.getElementById("auth-redirect").classList.remove("hidden");
    return;
  }

  document.getElementById("main-content").classList.remove("hidden");
  
  const selectedAcademy = localStorage.getItem("selectedAcademy") || localStorage.getItem("academyId");
  
  if (!selectedAcademy) {
  console.log("No academy selected yet. Waiting for user selection.");
}

  try {
    const studentsData = await samsFetch(`/api/students/${selectedAcademy}`);
    if (!studentsData?.success || studentsData.students.length === 0) {
      alert("No registered students in this academy");
      return;
    }

    const academyData = await samsFetch(`/api/academy/${selectedAcademy}`);
    if (!academyData?.success) {
      alert("Academy not found");
      return;
    }

    const academy = academyData.academy;
    const container = document.getElementById("academies-container");

    container.innerHTML = `
    <div class="academy-card">
      <div class="bg-white/5 backdrop-blur-xl border-2 border-blue-500/40 rounded-3xl p-10 shadow-2xl relative overflow-hidden">
        <div class="w-28 h-28 bg-gradient-to-br from-blue-500 to-purple-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl border-4 border-white/20">
          <span class="text-3xl font-black">
            ${academy.name.substring(0,2).toUpperCase()}
          </span>
        </div>
        <h3 class="text-3xl font-black text-white text-center mb-6">
          ${academy.name}
        </h3>
        <div class="space-y-4 text-center text-blue-200 font-semibold">
          <p>📍 ${academy.city || academy.address || "Unknown Location"}</p>
          <p>🏟 Managed by: ${academy.manager}</p>
          <p>👨‍🎓 Students: ${studentsData.students.length}</p>
        </div>
        <button onclick="enterAcademy('${academy._id}')"
          class="mt-10 w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white font-black text-xl py-4 rounded-2xl">
          🚀 ENTER ACADEMY
        </button>
      </div>
    </div>
    `;

    document.getElementById("academy-count").textContent = "1";

  } catch (err) {
    console.error(err);
    alert("Server connection failed");
  }
});

function enterAcademy(id) {

  localStorage.setItem("academyId", id);
  localStorage.setItem("selectedAcademy", id);

  window.location.href = "academy_dashboard.html";

}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>
