<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visitor - Browse Academies • SAM SYSTEM</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black min-h-screen font-sans">

  <!-- HEADER -->
  <header class="bg-gradient-to-r from-gray-900 to-black border-b-2 border-green-600 p-6 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center space-x-4">
	  <p id="visitorName" class="text-green-400 text-sm font-semibold">Loading...</p>
        <div class="w-12 h-12 bg-green-600 rounded-xl flex items-center justify-center">
          <span class="text-2xl">👀</span>
        </div>
        <div>
          <h1 class="text-2xl font-black text-white tracking-tight">SAM SYSTEM</h1>
          <p class="text-green-400 text-sm font-semibold">VISITOR MODE</p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <button onclick="toggleSearch()" class="p-3 bg-white/10 hover:bg-white/20 border border-white/30 rounded-xl text-white transition-all duration-200">
          <span class="text-xl">🔍</span>
        </button>
        <button onclick="logout()" class="px-6 py-2 bg-white/10 hover:bg-white/20 border border-white/30 rounded-xl text-white font-semibold transition-all duration-200">
          Logout
        </button>
      </div>
    </div>

    <!-- SEARCH BAR -->
    <div id="searchContainer" class="max-w-6xl mx-auto px-6 pb-6 hidden">
      <div class="relative">
        <input type="text" id="academySearch" placeholder="Search academies, sports, or locations..." class="w-full input-field pl-14 pr-6 py-4 text-lg" maxlength="100">
        <span class="absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl">🔍</span>
        <div id="clearSearch" class="absolute right-5 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white cursor-pointer hidden">
          <span class="text-xl">✕</span>
        </div>
      </div>
      <div id="searchCount" class="text-sm text-gray-400 mt-2 hidden"></div>
    </div>
  </header>

  <!-- ACADEMIES LIST -->
  <div class="max-w-6xl mx-auto p-6 pb-12">
    <div class="mb-12">
      <h2 class="text-3xl font-black text-white mb-8 flex items-center">
        <span class="w-12 h-12 bg-gradient-to-r from-green-500 to-green-600 rounded-xl flex items-center justify-center mr-4 text-2xl">🏟️</span>
        Available Academies (A-Z)
      </h2>

      <!-- ACADEMIES ONLY -->
      <div id="academiesList" class="space-y-6">
        
       <div class="text-center py-12">
  <div class="w-20 h-20 bg-green-500 rounded-2xl flex items-center justify-center mx-auto mb-6">
    <i class="fas fa-spinner fa-spin text-2xl text-white"></i>
  </div>
  <p class="text-xl text-gray-400">Loading academies from database...</p>
</div>


      </div>
    </div>
  </div>

  <script>
    // Check visitor role on load
   window.addEventListener('DOMContentLoaded', async function() {
  const visitorSession = localStorage.getItem('visitorSession');
  if (!visitorSession) {
    alert('👋 Please login as Visitor');
    window.location.href = 'index.html';
    return;
  }
  
  await loadRealAcademies();
});

async function loadRealAcademies() {
  try {
    const response = await fetch('https://sams-backend-54o0.onrender.com/api/academies');
    const academies = await response.json();
    
    const container = document.getElementById('academiesList');
    container.innerHTML = academies.map(academy => `
      <div class="group login-card bg-gradient-to-b from-gray-900/80 to-black/50 border-2 border-green-500 hover:border-green-400 p-8 rounded-3xl cursor-pointer transition-all duration-300 hover:-translate-y-2" onclick="goToStudents('${academy._id}')">
        <div class="flex items-start justify-between">
          <div class="flex items-start space-x-6 flex-1">
            <div class="w-20 h-20 bg-gradient-to-r from-green-500 to-emerald-500 rounded-2xl flex items-center justify-center flex-shrink-0 mt-1">
              <span class="text-2xl">${academy.name?.charAt(0) || 'S'}</span>
            </div>
            <div class="flex-1 min-w-0 pt-1">
              <h3 class="text-2xl font-black text-white mb-2 truncate">${academy.name}</h3>
              <p class="text-green-400 font-semibold mb-1">📍 ${academy.address || 'Location'}</p>
            </div>
          </div>
          <div class="text-right">
            <div class="text-3xl font-black text-green-400 mb-2">—</div>
            <p class="text-sm text-gray-400 uppercase tracking-wider">View Players</p>
          </div>
        </div>
        <div class="flex items-center pt-6 border-t border-white/10">
          <button class="ml-auto px-8 py-3 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-bold rounded-xl transition-all shadow-lg">
            View Players →
          </button>
        </div>
      </div>
    `).join('') || '<p class="text-center text-gray-400 py-12">No academies found</p>';
  } catch (err) {
    document.getElementById('academiesList').innerHTML = '<p class="text-center text-red-400 py-12">Failed to load academies</p>';
  }
}


    // Toggle search bar
    function toggleSearch() {
      const container = document.getElementById('searchContainer');
      const button = event.target.closest('button');
      
      container.classList.toggle('hidden');
      
      if (!container.classList.contains('hidden')) {
        document.getElementById('academySearch').focus();
        button.innerHTML = '<span class="text-xl">✕</span>';
      } else {
        button.innerHTML = '<span class="text-xl">🔍</span>';
        clearSearch();
      }
    }

    // Live search functionality
    document.getElementById('academySearch').addEventListener('input', function(e) {
      const query = e.target.value.toLowerCase().trim();
      const academies = document.querySelectorAll('#academiesList > div');
      const clearBtn = document.getElementById('clearSearch');
      const countEl = document.getElementById('searchCount');
      
      let visibleCount = 0;
      
      academies.forEach(academy => {
        const text = academy.textContent.toLowerCase();
        const isVisible = text.includes(query);
        
        academy.style.display = isVisible ? 'block' : 'none';
        
        if (isVisible) visibleCount++;
      });
      
      // Show/hide clear button
      clearBtn.classList.toggle('hidden', query.length === 0);
      
      // Update search count
      countEl.classList.toggle('hidden', query.length === 0);
      if (query.length > 0) {
        countEl.textContent = `Showing ${visibleCount} of ${academies.length} academies`;
      }
    });

    // Clear search
    document.getElementById('clearSearch').addEventListener('click', function() {
      document.getElementById('academySearch').value = '';
      document.getElementById('academiesList').querySelectorAll('div').forEach(academy => {
        academy.style.display = 'block';
      });
      this.classList.add('hidden');
      document.getElementById('searchCount').classList.add('hidden');
    });

    // Enter key to toggle search
    document.addEventListener('keypress', function(e) {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        toggleSearch();
      }
    });

    // Go to visitor_students.html
    function goToStudents(academyId) {
     window.location.href = `visitor_students.html?academyId=${academyId}`;
     }

    // Logout function
    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }
	
	// Show visitor name
    document.addEventListener('DOMContentLoaded', () => {
    const name = localStorage.getItem('visitorName');
    if (name) document.getElementById('visitorName').textContent = `Welcome, ${name}`;
    });


    // Close search on escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const container = document.getElementById('searchContainer');
        if (!container.classList.contains('hidden')) {
          toggleSearch();
        }
      }
    });
  </script>

</body>
</html>
